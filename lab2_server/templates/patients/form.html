{% extends "base.html" %}
{% block title %}{{ "Edit" if patient else "Create" }} Patient{% endblock %}
{% block content %}
<h2>{{ "Edit" if patient else "Create" }} Patient</h2>
<form method="post" action="{{ '/patients/edit/' ~ patient.id if patient else '/patients/create' }}">
	<div class="mb-3">
		<label class="form-label">First Name</label>
		<input type="text" name="first_name" class="form-control" value="{{ patient.first_name if patient else '' }}" required>
	</div>
	<div class="mb-3">
		<label class="form-label">Last Name</label>
		<input type="text" name="last_name" class="form-control" value="{{ patient.last_name if patient else '' }}" required>
	</div>
	<div class="mb-3">
		<label class="form-label">Email</label>
		<input type="email" name="email" class="form-control" value="{{ patient.email if patient else '' }}" required>
	</div>
	<button type="submit" class="btn btn-primary">Save</button>
	<a href="/patients/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
