{% extends "base.html" %}
{% block title %}Patients{% endblock %}
{% block content %}
<h2>Patients</h2>
<a href="/patients/create" class="btn btn-success mb-3">+ Add Patient</a>
<table class="table table-striped">
	<thead>
		<tr>
			<th>ID</th>
			<th>First Name</th>
			<th>Last Name</th>
			<th>Email</th>
			<th>Actions</th>
		</tr>
	</thead>
	<tbody>
		{% for p in patients %}
		<tr>
			<td>{{ p.id }}</td>
			<td>{{ p.first_name }}</td>
			<td>{{ p.last_name }}</td>
			<td>{{ p.email }}</td>
			<td>
				<a href="/patients/edit/{{ p.id }}" class="btn btn-sm btn-warning">Edit</a>
				<form action="/patients/delete/{{ p.id }}" method="post" style="display:inline">
					<button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</button>
				</form>
			</td>
		</tr>
		{% endfor %}
	</tbody>
</table>
{% endblock %}
