{% extends "base.html" %}
{% block title %}Doctors{% endblock %}
{% block content %}
<h2>Doctors</h2>
<a href="/doctors/create" class="btn btn-success mb-3">+ Add Doctor</a>
<table class="table table-striped">
	<thead>
		<tr>
			<th>ID</th>
			<th>Name</th>
			<th>Specialization</th>
			<th>Actions</th>
		</tr>
	</thead>
	<tbody>
		{% for d in doctors %}
		<tr>
			<td>{{ d.id }}</td>
			<td>{{ d.first_name }}</td>
			<td>{{ d.specialization }}</td>
			<td>
				<a href="/doctors/edit/{{ d.id }}" class="btn btn-sm btn-warning">Edit</a>
				<form action="/doctors/delete/{{ d.id }}" method="post" style="display:inline">
					<button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</button>
				</form>
			</td>
		</tr>
		{% endfor %}
	</tbody>
</table>
{% endblock %}
