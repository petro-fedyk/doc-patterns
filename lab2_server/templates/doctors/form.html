{% extends "base.html" %}
{% block title %}{{ "Edit" if doctor else "Create" }} Doctor{% endblock %}
{% block content %}
<h2>{{ "Edit" if doctor else "Create" }} Doctor</h2>
<form method="post" action="{{ '/doctors/edit/' ~ doctor.id if doctor else '/doctors/create' }}">
	<div class="mb-3">
		<label class="form-label">Name</label>
		<input type="text" name="first_name" class="form-control" value="{{ doctor.first_name if doctor else '' }}" required>
	</div>
	<div class="mb-3">
		<label class="form-label">Specialization</label>
		<input type="text" name="specialization" class="form-control" value="{{ doctor.specialization if doctor else '' }}" required>
	</div>
	<button type="submit" class="btn btn-primary">Save</button>
	<a href="/doctors/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
